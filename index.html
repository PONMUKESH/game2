<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arena Rangers</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-wrap" aria-label="Arena Rangers game">
        <canvas id="game" width="1280" height="720" tabindex="0"></canvas>
        <div class="touch-controls" id="touch-controls" aria-label="Touch controls">
          <div class="joystick-shell" id="move-joystick">
            <div class="joystick-knob" id="move-knob"></div>
          </div>
          <button class="trigger-btn" id="shoot-trigger" type="button">Fire</button>
        </div>
        <div class="hud top-left">
          <strong>Arena Rangers</strong>
          <span id="status">Connecting...</span>
          <span id="position">Position: --</span>
        </div>
        <div class="hud top-right">
          <strong>Leaderboard</strong>
          <ol id="leaderboard"></ol>
        </div>
        <div class="hud bottom-left">
          <span>Move: WASD / arrows</span>
          <span>Aim: mouse</span>
          <span>Shoot: click / space</span>
        </div>
        <div class="join" id="join">
          <div class="join-panel">
            <h1>Arena Rangers</h1>
            <p>Enter a callsign, choose a character, and drop into the arena.</p>
            <label>
              Callsign
              <input id="name" maxlength="16" autocomplete="off" value="Ranger">
            </label>
            <label>
              Mode
              <select id="mode-select">
                <option value="solo">Solo (bots)</option>
                <option value="invite">Invite (share link)</option>
              </select>
            </label>
            <div class="invite" id="invite-panel" style="display:none;">
              <input id="invite-link" readonly>
              <button id="copy-invite" type="button">Copy Invite Link</button>
            </div>
            <label>
              Bots
              <input id="bot-count" type="number" min="0" max="8" value="3">
            </label>
            <label>
              Difficulty
              <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
                <option value="veryhard">Very Hard</option>
              </select>
            </label>
            <div class="characters" id="characters"></div>
            <button id="play">Enter Arena</button>
          </div>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
